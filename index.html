<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Who's About - V1 Prototype</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
  <meta name="theme-color" content="#111827" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <div class="eyebrow">Private meetup board</div>
        <h1>Who’s About?</h1>
      </div>
      <button id="adminLockBtn" class="pill">🔒 Admin</button>
    </header>

    <main id="screen" class="screen"></main>

    <nav class="bottom-nav">
      <button data-tab="home" class="active">Home</button>
      <button data-tab="create">Create</button>
      <button data-tab="join">Join</button>
      <button data-tab="manage">Manage</button>
      <button data-tab="support">Support</button>
    </nav>
  </div>

  <template id="homeTpl">
    <section class="filters">
      <button class="filter active" data-filter="all">All</button>
      <button class="filter" data-filter="now">Now</button>
      <button class="filter" data-filter="today">Today</button>
      <button class="filter" data-filter="week">This week</button>
    </section>
    <section id="feed" class="feed"></section>
  </template>

  <template id="createTpl">
    <section class="card">
      <h2>Create meetup</h2>
      <p class="muted">Type the first post only. Replies stay as set buttons.</p>
      <label>What are you doing?</label>
      <input id="postText" maxlength="80" placeholder="Coffee in Skipton town" />

      <label>Category</label>
      <select id="category">
        <option value="☕ Coffee">☕ Coffee</option>
        <option value="🚶 Walk">🚶 Walk</option>
        <option value="🍛 Food">🍛 Food</option>
        <option value="🏋️ Activity">🏋️ Activity</option>
        <option value="👋 General meetup">👋 General meetup</option>
      </select>

      <label>Location</label>
      <input id="location" maxlength="60" placeholder="Costa High Street, Skipton" />

      <label>When?</label>
      <div class="segmented" id="whenChoice">
        <button data-when="now" class="selected">Now</button>
        <button data-when="today">Later today</button>
        <button data-when="week">This week</button>
      </div>

      <label>Time</label>
      <input id="time" type="time" />

      <button id="createPost" class="primary">Post meetup</button>
      <div id="createMsg" class="notice hidden"></div>
    </section>
  </template>

  <template id="joinTpl">
    <section class="card">
      <h2>Join group</h2>
      <p class="muted">This simulates QR joining. In the real app, QR codes would auto-fill the code.</p>
      <label>Invite / QR code</label>
      <input id="inviteCode" placeholder="SKIPTON-AMC-001" />

      <label>Your first name</label>
      <input id="joinName" placeholder="Dave" />

      <label>Area</label>
      <input id="joinArea" placeholder="Skipton" />

      <div class="rulebox">
        <strong>Before joining</strong>
        <p>No private messages. No debates. Meetups only. This is not a crisis service.</p>
      </div>

      <button id="joinRequest" class="primary">Request access</button>
      <div id="joinMsg" class="notice hidden"></div>
    </section>

    <section class="card">
      <h2>Live QR demo</h2>
      <p class="muted">A facilitator can show a temporary QR valid for 2 hours.</p>
      <canvas id="qrCanvas" width="220" height="220"></canvas>
      <div class="qr-meta">
        <span id="liveCode"></span>
        <span id="validUntil"></span>
      </div>
      <button id="refreshQR" class="secondary">Generate live QR</button>
    </section>
  </template>

  <template id="manageTpl">
    <section class="card">
      <h2>Manage group</h2>
      <p class="muted">Admin/moderator controls stay locked until the admin code is entered.</p>
      <div id="lockedPanel" class="rulebox hidden"><strong>Locked</strong><p>Tap the Admin button at the top and enter the code to manage approvals, posters and posts.</p></div>
      <div class="stats">
        <div><strong id="pendingCount">0</strong><span>Pending</span></div>
        <div><strong id="postCount">0</strong><span>Meetups</span></div>
        <div><strong id="posterCount">0</strong><span>Posters</span></div>
      </div>
    </section>

    <section class="card">
      <h3>Create poster QR</h3>
      <label>Print authorisation code</label>
      <input id="printCode" type="password" placeholder="Enter print code" />
      <label>Poster location / note</label>
      <input id="posterNote" placeholder="Skipton AMC main room" />
      <button id="createPoster" class="primary">Create fingerprinted poster</button>
      <div id="posterMsg" class="notice hidden"></div>
      <div id="posterList" class="list"></div>
    </section>

    <section class="card">
      <h3>Pending approvals</h3>
      <div id="pendingList" class="list"></div>
    </section>
  </template>

  <template id="supportTpl">
    <section class="card support">
      <h2>Need help now?</h2>
      <p>This app is for arranging meetups. It is not a crisis service.</p>
      <a class="support-btn" href="tel:116123">Call Samaritans: 116 123</a>
      <a class="support-btn" href="sms:85258">Text SHOUT: 85258</a>
      <a class="support-btn" href="tel:111">Call NHS 111</a>
      <a class="support-btn danger" href="tel:999">Emergency: 999</a>
    </section>

    <section class="card">
      <h2>Core rules</h2>
      <ul class="rules">
        <li>No private messaging.</li>
        <li>No discussions or debates.</li>
        <li>Posts must be about real meetups.</li>
        <li>Be respectful. No pressure.</li>
        <li>Moderators can remove posts or members to keep it safe.</li>
      </ul>
    </section>
  </template>


  <div id="adminModal" class="modal hidden">
    <div class="modal-card">
      <h2>Admin lock</h2>
      <p class="muted">Enter the admin code to unlock moderator/admin controls.</p>
      <input id="adminCodeInput" type="password" placeholder="Admin code" />
      <div class="modal-actions">
        <button id="unlockAdmin" class="primary">Unlock</button>
        <button id="closeAdminModal" class="secondary">Cancel</button>
      </div>
      <div id="adminLockMsg" class="notice hidden"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
