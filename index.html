<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Who’s About - Simple Pilot</title>
  <link rel="stylesheet" href="styles.css" />
  <meta name="theme-color" content="#0b1220" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <div class="eyebrow"><span id="groupLabel">Skipton Pilot</span> · v1.1 no-cache</div>
        <h1>Who’s About?</h1>
      </div>
      <button id="adminLockBtn" class="pill">🔒 Admin</button>
    </header>

    <main id="screen" class="screen"></main>

    <nav class="bottom-nav">
      <button data-tab="home" class="active">Home</button>
      <button data-tab="post">Post</button>
      <button data-tab="join">Add</button>
      <button data-tab="manage">Admin</button>
      <button data-tab="help">Help</button>
    </nav>
  </div>

  <div id="adminModal" class="modal hidden">
    <div class="modal-card">
      <h2>Admin unlock</h2>
      <p class="muted">Unlock group controls.</p>
      <input id="adminCodeInput" type="password" placeholder="Admin code" />
      <button id="unlockAdmin" class="primary">Unlock</button>
      <button id="closeAdminModal" class="secondary">Cancel</button>
      <div id="adminLockMsg" class="notice hidden"></div>
    </div>
  </div>

  <template id="homeTpl">
    <section id="adminBanner" class="admin-banner hidden">🔓 Admin Mode Active</section>
    <section id="offlineNotice" class="card offline hidden">
      <h2>App temporarily offline</h2>
      <p>This group is currently unavailable. Please check back later.</p>
    </section>

    <section class="hero">
      <h2>A digital buddy bench</h2>
      <p>Post a coffee, walk, gym session or food plan. Others can tap in. No private messages, no debate threads.</p>
      <button id="quickPostBtn" class="primary">➕ Post something</button>
    </section>

    <section class="filters">
      <button class="filter active" data-filter="all">All</button>
      <button class="filter" data-filter="now">Now</button>
      <button class="filter" data-filter="today">Today</button>
      <button class="filter" data-filter="week">This week</button>
    </section>

    <section id="feed" class="feed"></section>
  </template>

  <template id="postTpl">
    <section id="adminBanner" class="admin-banner hidden">🔓 Admin Mode Active</section>
    <section class="card">
      <h2>Post a meetup</h2>
      <p class="muted">Keep it short. The app controls replies.</p>

      <div class="quick-types">
        <button data-type="☕ Coffee">☕ Coffee</button>
        <button data-type="🚶 Walk">🚶 Walk</button>
        <button data-type="🍛 Food">🍛 Food</button>
        <button data-type="🏋️ Activity">🏋️ Activity</button>
      </div>

      <label>What are you doing?</label>
      <input id="postText" maxlength="80" placeholder="Coffee in town" />

      <label>Location</label>
      <input id="location" maxlength="60" placeholder="Costa, Skipton" />

      <label>When?</label>
      <div class="segmented" id="whenChoice">
        <button data-when="now" class="selected">Now</button>
        <button data-when="today">Today</button>
        <button data-when="week">This week</button>
      </div>

      <label>Time</label>
      <input id="time" type="time" />

      <button id="createPost" class="primary">Post meetup</button>
      <div id="createMsg" class="notice hidden"></div>
    </section>
  </template>

  <template id="joinTpl">
    <section id="adminBanner" class="admin-banner hidden">🔓 Admin Mode Active</section>
    <section class="card">
      <h2>Add someone</h2>
      <p class="muted">Simple pilot join. Add a person into pending approval, then approve them in Admin.</p>

      <label>First name</label>
      <input id="joinName" placeholder="Dave" />

      <label>Area</label>
      <input id="joinArea" placeholder="Skipton" />

      <label>Join code / poster code</label>
      <input id="inviteCode" placeholder="SKIPTON-PILOT" value="SKIPTON-PILOT" />

      <button id="joinRequest" class="primary">Add to pending</button>
      <div id="joinMsg" class="notice hidden"></div>
    </section>

    <section class="card">
      <h2>Share join QR</h2>
      <p class="muted">For the pilot, show this QR to someone in person. They still need approval.</p>
      <canvas id="qrCanvas" width="220" height="220"></canvas>
      <div class="qr-meta">
        <span id="liveCode"></span>
        <span id="validUntil"></span>
      </div>
      <button id="refreshQR" class="secondary">Refresh QR</button>
    </section>
  </template>

  <template id="manageTpl">
    <section id="adminBanner" class="admin-banner hidden">🔓 Admin Mode Active</section>

    <section id="lockedPanel" class="card locked-note hidden">
      <h2>Admin locked</h2>
      <p>Tap the Admin button at the top and enter the code to manage this group.</p>
    </section>

    <section class="card admin-card">
      <h2>Group controls</h2>
      <div class="stats">
        <div><strong id="pendingCount">0</strong><span>Pending</span></div>
        <div><strong id="memberCount">0</strong><span>Members</span></div>
        <div><strong id="postCount">0</strong><span>Meetups</span></div>
      </div>
      <button id="toggleGroupLock" class="dangerBtn">Lock group</button>
      <button id="resetDemo" class="secondary">Reset pilot demo</button>
    </section>

    <section class="card admin-card">
      <h3>Pending people</h3>
      <div id="pendingList" class="list"></div>
    </section>

    <section class="card admin-card">
      <h3>Members</h3>
      <div id="memberList" class="list"></div>
    </section>

    <section class="card admin-card">
      <h3>Groups</h3>
      <label>Current group</label>
      <select id="groupSelect"></select>
      <label>New pilot group</label>
      <input id="newGroupName" placeholder="Keighley Pilot" />
      <button id="createGroup" class="primary">Create group</button>
      <div id="groupMsg" class="notice hidden"></div>
    </section>
  </template>

  <template id="helpTpl">
    <section id="adminBanner" class="admin-banner hidden">🔓 Admin Mode Active</section>
    <section class="card">
      <h2>Rules</h2>
      <ul class="rules">
        <li>No private messages.</li>
        <li>No discussions or debates.</li>
        <li>Only post real meetups.</li>
        <li>Be respectful and don’t pressure anyone.</li>
        <li>This is not a crisis service.</li>
      </ul>
    </section>

    <section class="card support">
      <h2>Need help now?</h2>
      <p>This app is for meetups, not crisis support.</p>
      <a class="support-btn" href="tel:116123">Call Samaritans: 116 123</a>
      <a class="support-btn" href="sms:85258">Text SHOUT: 85258</a>
      <a class="support-btn" href="tel:111">Call NHS 111</a>
      <a class="support-btn danger" href="tel:999">Emergency: 999</a>
    </section>
  </template>

  <script src="app.js"></script>
</body>
</html>
